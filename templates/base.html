<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agricultural Advisory System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/final.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/force-charts-visible.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-seedling"></i>
            <h4>AgriAdvisor</h4>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i class="fas fa-home"></i> <span>Dashboard</span>
            </a>
            <a href="{{ url_for('crops') }}" class="nav-item {% if request.endpoint == 'crops' %}active{% endif %}">
                <i class="fas fa-leaf"></i> <span>Crop Management</span>
            </a>
            <a href="{{ url_for('weather') }}" class="nav-item {% if request.endpoint == 'weather' %}active{% endif %}">
                <i class="fas fa-cloud-sun"></i> <span>Weather</span>
            </a>
            <a href="{{ url_for('market') }}" class="nav-item {% if request.endpoint == 'market' %}active{% endif %}">
                <i class="fas fa-chart-line"></i> <span>Market Prices</span>
            </a>
            <a href="{{ url_for('soil') }}" class="nav-item {% if request.endpoint == 'soil' %}active{% endif %}">
                <i class="fas fa-flask"></i> <span>Soil Analysis</span>
            </a>
            <a href="{{ url_for('finance') }}" class="nav-item {% if request.endpoint == 'finance' %}active{% endif %}">
                <i class="fas fa-wallet"></i> <span>Finance</span>
            </a>
            <a href="{{ url_for('labor') }}" class="nav-item {% if request.endpoint == 'labor' %}active{% endif %}">
                <i class="fas fa-users"></i> <span>Labor</span>
            </a>
            <a href="{{ url_for('equipment') }}" class="nav-item {% if request.endpoint == 'equipment' %}active{% endif %}">
                <i class="fas fa-tractor"></i> <span>Equipment</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="{{ url_for('logout') }}" class="nav-item">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <!-- Top Navbar -->
        <nav class="top-navbar">
            <button class="btn-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="navbar-right">
                <span class="user-name"><i class="fas fa-user-circle"></i> {{ session.username }}</span>
            </div>
        </nav>

        <!-- Page Content -->
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sidebar toggle
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.getElementById('mainContent').classList.toggle('expanded');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
